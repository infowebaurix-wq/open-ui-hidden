name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract release notes from changelog
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "Manual run without a tag ref: no release created." >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -Eq "^## \\[$VERSION\\]" CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version: $VERSION" >&2
            exit 1
          fi

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" {capture=1; next}
            /^## \[/ && capture {exit}
            capture {print}
          ' CHANGELOG.md > release_notes.md

          if [[ ! -s release_notes.md ]]; then
            echo "No release notes found for version: $VERSION" >&2
            exit 1
          fi

          {
            echo "release_notes<<EOF"
            cat release_notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "skip_release=false" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: steps.notes.outputs.skip_release == 'false'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.release_notes }}
          generate_release_notes: false
